<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Naufal Zainul Arifin — Portfolio UI Kit</title>
  <link rel="icon" href="../../assets/favicon.svg"/>
  <link rel="stylesheet" href="../../colors_and_type.css"/>
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: var(--font-sans);
      color: var(--text);
      background: var(--bg);
      transition: background .3s, color .3s;
      -webkit-font-smoothing: antialiased;
    }
    a { color: inherit; }
    @keyframes blink { 50% { opacity: 0; } }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%      { opacity: .7; transform: scale(1.2); }
    }
    .btn-primary:hover { opacity: .9; transform: translateY(-1px); }
  </style>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="Nav.jsx"></script>
  <script type="text/babel" src="Hero.jsx"></script>
  <script type="text/babel" src="Sections.jsx"></script>
  <script type="text/babel" src="FeedShell.jsx"></script>
  <script type="text/babel" src="ProjectFeed.jsx"></script>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const App = () => {
      const [route, setRoute] = useState('home');         // home | portfolio | articles
      const [dark, setDark]   = useState(() => {
        try { return localStorage.getItem('naufal-theme') === 'dark'; } catch (e) { return false; }
      });
      const [activeTag, setActiveTag]   = useState('all');
      const [activeType, setActiveType] = useState('all');
      const [search, setSearch]         = useState('');

      useEffect(() => {
        document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
        try { localStorage.setItem('naufal-theme', dark ? 'dark' : 'light'); } catch (e) {}
      }, [dark]);

      const nav = (id) => {
        if (id === 'home' || id === 'portfolio' || id === 'articles') setRoute(id);
        else { setRoute('home'); setTimeout(() => {
          const el = document.getElementById(id);
          if (el) el.scrollIntoView({ behavior: 'smooth' });
        }, 50); }
      };

      if (route === 'home') {
        return (
          <div data-screen-label="01 Home">
            <Nav active="home" dark={dark} onToggleDark={() => setDark(d => !d)} onNav={nav}/>
            <Hero dark={dark}/>
            <BentoGrid/>
            <ExperienceList/>
            <CertificateList/>
            <section id="portfolio" style={{padding:'5rem 0', background:'var(--bg)', position:'relative', overflow:'hidden'}}>
              <div style={{position:'absolute', top:-120, right:-120, width:420, height:420, borderRadius:'50%', background:'var(--gradient)', opacity:0.08, filter:'blur(60px)', pointerEvents:'none'}}/>
              <div style={{position:'absolute', bottom:-140, left:-100, width:360, height:360, borderRadius:'50%', background:'linear-gradient(135deg, #06b6d4, #3b82f6)', opacity:0.06, filter:'blur(70px)', pointerEvents:'none'}}/>
              <div style={{maxWidth:1000, margin:'0 auto', padding:'0 1.5rem', position:'relative'}}>
                <div style={{
                  position:'relative', padding:'3.5rem 3rem',
                  borderRadius:24, overflow:'hidden',
                  background:'var(--bg-card)', border:'1px solid var(--border)',
                  boxShadow:'0 20px 60px rgba(15,23,42,.08)',
                  display:'grid', gridTemplateColumns:'1fr 340px', gap:'2.5rem', alignItems:'center'
                }}>
                  <div style={{position:'absolute', inset:0, background:'var(--gradient)', opacity:.04, pointerEvents:'none'}}/>
                  <div style={{position:'relative'}}>
                    <div style={{
                      display:'inline-flex', alignItems:'center', gap:'.4rem',
                      padding:'.3rem .7rem', borderRadius:50,
                      background:'var(--accent-light)', color:'var(--accent)',
                      fontSize:'.72rem', fontWeight:700, letterSpacing:'.5px', textTransform:'uppercase',
                      marginBottom:'1rem'
                    }}>
                      <span style={{width:6, height:6, borderRadius:'50%', background:'var(--accent)'}}/>
                      Featured work
                    </div>
                    <h2 style={{fontSize:'2.4rem', fontWeight:800, letterSpacing:'-.02em', lineHeight:1.1, color:'var(--text)', margin:'0 0 1rem'}}>
                      Explore my <span style={{background:'var(--gradient)', WebkitBackgroundClip:'text', WebkitTextFillColor:'transparent'}}>Portfolio</span>
                    </h2>
                    <p style={{fontSize:'1.05rem', lineHeight:1.6, color:'var(--text-secondary)', margin:'0 0 1.75rem', maxWidth:500}}>
                      Seven case studies in a masonry feed — GIS, data engineering, urban analytics. Tap any card to open the full story in a side reader, or deep-link straight to the write-up.
                    </p>
                    <div style={{display:'flex', gap:'2rem', marginBottom:'2rem'}}>
                      <div>
                        <div style={{fontSize:'1.75rem', fontWeight:800, color:'var(--text)', lineHeight:1}}>7</div>
                        <div style={{fontSize:'.72rem', textTransform:'uppercase', letterSpacing:'.5px', color:'var(--text-secondary)', fontWeight:600, marginTop:4}}>Case Studies</div>
                      </div>
                      <div>
                        <div style={{fontSize:'1.75rem', fontWeight:800, color:'var(--text)', lineHeight:1}}>4</div>
                        <div style={{fontSize:'.72rem', textTransform:'uppercase', letterSpacing:'.5px', color:'var(--text-secondary)', fontWeight:600, marginTop:4}}>Categories</div>
                      </div>
                      <div>
                        <div style={{fontSize:'1.75rem', fontWeight:800, color:'var(--text)', lineHeight:1}}>2.1M+</div>
                        <div style={{fontSize:'.72rem', textTransform:'uppercase', letterSpacing:'.5px', color:'var(--text-secondary)', fontWeight:600, marginTop:4}}>Data Points</div>
                      </div>
                    </div>
                    <div style={{display:'flex', gap:'.75rem', flexWrap:'wrap'}}>
                      <a href="portfolio-interactive.html" style={{
                        display:'inline-flex', alignItems:'center', gap:'.55rem',
                        padding:'.95rem 1.75rem', borderRadius:12,
                        background:'var(--text)', color:'var(--bg)',
                        fontWeight:600, fontSize:'.95rem', textDecoration:'none',
                        boxShadow:'0 10px 30px rgba(15,23,42,.2)',
                        transition:'transform .2s, box-shadow .2s'
                      }} onMouseEnter={e=>{e.currentTarget.style.transform='translateY(-2px)';e.currentTarget.style.boxShadow='0 14px 36px rgba(15,23,42,.28)';}}
                         onMouseLeave={e=>{e.currentTarget.style.transform='none';e.currentTarget.style.boxShadow='0 10px 30px rgba(15,23,42,.2)';}}>
                        Open Interactive Portfolio
                        <svg width="16" height="16" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" viewBox="0 0 24 24"><path d="M5 12h14M13 5l7 7-7 7"/></svg>
                      </a>
                      <a href="#contact" style={{
                        display:'inline-flex', alignItems:'center', gap:'.5rem',
                        padding:'.95rem 1.5rem', borderRadius:12,
                        background:'transparent', color:'var(--text)',
                        border:'1px solid var(--border)',
                        fontWeight:600, fontSize:'.95rem', textDecoration:'none'
                      }}>Get in touch</a>
                    </div>
                  </div>
                  <div style={{position:'relative', height:340, display:'flex', alignItems:'center', justifyContent:'center'}}>
                    <div style={{position:'absolute', top:10, right:0, width:180, height:220, borderRadius:14, background:'var(--bg)', border:'1px solid var(--border)', boxShadow:'0 12px 30px rgba(0,0,0,.08)', transform:'rotate(6deg)', overflow:'hidden'}}>
                      <div style={{height:110, background:'linear-gradient(135deg, var(--accent-light), var(--bg-secondary))', display:'flex', alignItems:'center', justifyContent:'center', fontSize:'3rem', position:'relative'}}>
                        <div style={{position:'absolute', inset:0, background:'var(--gradient)', opacity:.1}}/>
                        <span style={{position:'relative'}}>🚲</span>
                      </div>
                      <div style={{padding:'.75rem'}}>
                        <div style={{fontSize:'.6rem', color:'var(--text-secondary)', marginBottom:4}}>Data Science</div>
                        <div style={{fontSize:'.78rem', fontWeight:700, lineHeight:1.35, color:'var(--text)'}}>NYC Bike-Share Patterns</div>
                      </div>
                    </div>
                    <div style={{position:'absolute', top:60, left:40, width:180, height:240, borderRadius:14, background:'var(--bg)', border:'1px solid var(--border)', boxShadow:'0 16px 40px rgba(0,0,0,.12)', transform:'rotate(-4deg)', overflow:'hidden', zIndex:2}}>
                      <div style={{height:130, background:'linear-gradient(135deg, var(--accent-light), var(--bg-secondary))', display:'flex', alignItems:'center', justifyContent:'center', fontSize:'3.5rem', position:'relative'}}>
                        <div style={{position:'absolute', inset:0, background:'var(--gradient)', opacity:.14}}/>
                        <span style={{position:'relative'}}>🕌</span>
                      </div>
                      <div style={{padding:'.85rem'}}>
                        <div style={{fontSize:'.6rem', color:'var(--text-secondary)', marginBottom:4}}>GIS &middot; Thesis</div>
                        <div style={{fontSize:'.8rem', fontWeight:700, lineHeight:1.35, color:'var(--text)'}}>Hedonic Pricing near Al-Jabbar</div>
                      </div>
                    </div>
                    <div style={{position:'absolute', bottom:10, right:30, width:160, height:180, borderRadius:14, background:'var(--bg)', border:'1px solid var(--border)', boxShadow:'0 10px 26px rgba(0,0,0,.06)', transform:'rotate(8deg)', overflow:'hidden'}}>
                      <div style={{height:90, background:'linear-gradient(135deg, var(--accent-light), var(--bg-secondary))', display:'flex', alignItems:'center', justifyContent:'center', fontSize:'2.5rem', position:'relative'}}>
                        <div style={{position:'absolute', inset:0, background:'var(--gradient)', opacity:.08}}/>
                        <span style={{position:'relative'}}>🗃️</span>
                      </div>
                      <div style={{padding:'.7rem'}}>
                        <div style={{fontSize:'.6rem', color:'var(--text-secondary)', marginBottom:4}}>SQL</div>
                        <div style={{fontSize:'.75rem', fontWeight:700, lineHeight:1.35, color:'var(--text)'}}>Relational DB Design</div>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </section>
            <ContactSection/>
          </div>
        );
      }

      // Feed-shell layout for Portfolio & Articles
      const typeForRoute = route === 'articles' ? 'article' : activeType;
      return (
        <div data-screen-label={route === 'portfolio' ? '02 Portfolio' : '03 Articles'}
             style={{display:'grid', gridTemplateColumns:'220px minmax(0, 1fr) 280px', minHeight:'100vh'}}>
          <Sidebar active={route} onNav={nav} dark={dark} onToggleDark={() => setDark(d => !d)}/>
          <main style={{padding:'1.75rem 2rem', borderRight:'1px solid var(--border)', borderLeft:'1px solid var(--border)'}}>
            <div style={{marginBottom:'1.5rem'}}>
              <h1 style={{fontSize:'1.5rem', fontWeight:700, color:'var(--text)', margin:'0 0 .25rem'}}>
                {route === 'portfolio' ? 'Portfolio' : 'Articles'}
              </h1>
              <p style={{fontSize:'.875rem', color:'var(--text-secondary)', margin:0}}>
                {route === 'portfolio'
                  ? 'Selected projects, thesis work, and open-source repositories.'
                  : 'Long-form write-ups on GIS, data engineering, and urban analytics.'}
              </p>
            </div>
            <ProjectFeed tab="all" activeTag={activeTag} activeType={typeForRoute} search={search}/>
          </main>
          <RightRail
            activeTag={activeTag}  onTag={setActiveTag}
            activeType={typeForRoute} onType={route === 'articles' ? () => {} : setActiveType}
            search={search} onSearch={setSearch}/>
        </div>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
