<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:#f8fafc;}
  body{padding:22px;font-family:var(--font-sans);color:#0f172a;display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;}
  .card{background:#fff;border:1px solid #e2e8f0;border-radius:14px;padding:16px;display:flex;flex-direction:column;justify-content:space-between;min-height:78px;}
  .sm{box-shadow:0 2px 8px rgba(0,0,0,.06);}
  .md{box-shadow:0 4px 20px rgba(0,0,0,.05);}
  .lg{box-shadow:0 8px 30px rgba(0,0,0,.08);}
  .glow{box-shadow:0 10px 30px rgba(59,130,246,.25);border-color:#3b82f6;}
  .name{font-size:12px;font-weight:600;}
  .val{font-size:11px;font-family:var(--font-mono);color:#64748b;}
</style>
</head>
<body>
  <div class="card sm"><span class="name">shadow-sm</span><span class="val">0 2 8 .06</span></div>
  <div class="card md"><span class="name">shadow-md</span><span class="val">0 4 20 .05</span></div>
  <div class="card lg"><span class="name">shadow-lg</span><span class="val">0 8 30 .08</span></div>
  <div class="card glow" style="grid-column:span 3;"><span class="name">accent glow (hover)</span><span class="val">0 10 30 rgba(59,130,246,.25)</span></div>
</body>
</html>
