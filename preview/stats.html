<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--bg);}
  body{padding:22px;font-family:var(--font-sans);color:#0f172a;display:flex;gap:22px;align-items:flex-end;}
  .stat{display:flex;flex-direction:column;gap:4px;}
  .num{font-size:1.75rem;font-weight:800;line-height:1;}
  .lbl{font-size:.72rem;text-transform:uppercase;letter-spacing:.5px;color:#64748b;}
</style>
</head>
<body>
  <div class="stat"><span class="num">2+</span><span class="lbl">Years Exp.</span></div>
  <div class="stat"><span class="num">4</span><span class="lbl">Certificates</span></div>
  <div class="stat"><span class="num">7</span><span class="lbl">Projects</span></div>
  <div class="stat"><span class="num">11+</span><span class="lbl">Tech Tools</span></div>
</body>
</html>
