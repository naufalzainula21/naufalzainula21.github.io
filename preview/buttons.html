<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--bg);}
  body{padding:22px;font-family:var(--font-sans);display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
  .btn{display:inline-flex;align-items:center;gap:.5rem;padding:.75rem 1.5rem;border-radius:10px;font-weight:600;font-size:.9rem;text-decoration:none;cursor:pointer;border:none;font-family:inherit;transition:all .2s;}
  .primary{background:#0f172a;color:#fff;}
  .primary:hover{transform:translateY(-2px);box-shadow:0 10px 30px rgba(15,23,42,.15);}
  .secondary{background:#fff;color:#0f172a;border:1px solid #e2e8f0;}
  .secondary:hover{border-color:#64748b;background:#f8fafc;}
  .ghost{background:transparent;color:#64748b;border:1px solid #e2e8f0;}
  .ghost:hover{border-color:#3b82f6;color:#3b82f6;background:#eff6ff;}
</style>
</head>
<body>
  <button class="btn primary">Get Resume</button>
  <button class="btn secondary">More About Me</button>
  <button class="btn ghost">Filter</button>
</body>
</html>
