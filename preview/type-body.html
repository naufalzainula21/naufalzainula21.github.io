<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--bg);}
  body{padding:22px;font-family:var(--font-sans);color:#0f172a;}
  .row{display:grid;grid-template-columns:170px 1fr;gap:14px 20px;align-items:baseline;}
  .lbl{font-size:11px;color:#64748b;font-family:var(--font-mono);text-transform:uppercase;letter-spacing:.05em;}
  .body{font-size:1rem;line-height:1.6;margin:0;max-width:520px;}
  .muted{color:#64748b;}
  .sm{font-size:.9rem;line-height:1.6;margin:0;color:#64748b;}
  .micro{font-size:.72rem;text-transform:uppercase;letter-spacing:.5px;font-weight:700;color:#64748b;}
</style>
</head>
<body>
  <div class="row">
    <div class="lbl">body / 1rem / 400 / 1.6</div>
    <p class="body">Conducted daily drone, Total Station, and RTK data collection for mining operations. Managed inventory and stockpile tracking.</p>
    <div class="lbl">small / 0.9rem</div>
    <p class="sm">Jul 2024 — Aug 2025 · Bandung, Indonesia</p>
    <div class="lbl">micro label / 0.72rem</div>
    <p class="micro">BASED&nbsp;IN · YEARS&nbsp;EXP.</p>
  </div>
</body>
</html>
