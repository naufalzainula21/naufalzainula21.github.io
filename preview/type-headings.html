<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--bg);}
  body{padding:22px;font-family:var(--font-sans);color:#0f172a;}
  .row{display:grid;grid-template-columns:170px 1fr;gap:14px 20px;align-items:baseline;}
  .lbl{font-size:11px;color:#64748b;font-family:var(--font-mono);text-transform:uppercase;letter-spacing:.05em;}
  .h2{font-size:1.75rem;font-weight:700;line-height:1.3;margin:0;}
  .sec{font-size:1.5rem;font-weight:700;margin:0;}
  .h3{font-size:1.25rem;font-weight:600;margin:0;}
</style>
</head>
<body>
  <div class="row">
    <div class="lbl">h2 / 1.75rem / 700</div><h2 class="h2">Get in touch</h2>
    <div class="lbl">section / 1.5rem / 700</div><h2 class="sec">At a Glance</h2>
    <div class="lbl">h3 / 1.25rem / 600</div><h2 class="h3">GIS Data Processing</h2>
  </div>
</body>
</html>
