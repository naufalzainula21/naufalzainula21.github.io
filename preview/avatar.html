<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--bg);}
  body{padding:22px;font-family:var(--font-sans);color:#0f172a;display:flex;gap:20px;align-items:center;}
  .shell{position:relative;padding:2px;}
  img{width:120px;height:120px;border-radius:50%;object-fit:cover;border:4px solid #e2e8f0;display:block;}
  .info{font-size:13px;color:#64748b;max-width:260px;line-height:1.55;}
  .info b{color:#0f172a;font-weight:700;}
  .avatar{width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,#3b82f6 0%,#06b6d4 100%);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:18px;}
</style>
</head>
<body>
  <img src="../assets/profile.jpg" alt="">
  <div class="avatar">N</div>
  <div class="info">Portrait on warm natural light — <b>280px circle</b>, <b>4px border</b>, <b>scale(1.05)</b> + accent glow on hover. The gradient avatar is the right-rail fallback.</div>
</body>
</html>
