<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:#f8fafc;}
  body{padding:20px;font-family:var(--font-sans);color:#0f172a;display:flex;gap:24px;align-items:center;}
  .logo{font-weight:800;font-size:3.5rem;line-height:1;color:#0f172a;}
  .logo span{background:linear-gradient(135deg,#3b82f6 0%,#06b6d4 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
  .fav{width:72px;height:72px;border-radius:14px;background:#0f172a;display:flex;align-items:flex-end;justify-content:flex-start;padding:6px 10px;position:relative;}
  .fav .n{color:#fff;font-size:52px;font-weight:800;line-height:.85;}
  .fav .dot{position:absolute;right:10px;bottom:12px;width:12px;height:12px;border-radius:50%;background:#3b82f6;}
  .meta{font-family:var(--font-mono);font-size:11px;color:#64748b;}
</style>
</head>
<body>
  <div style="text-align:center;"><div class="logo">n<span>.</span></div><div class="meta" style="margin-top:4px;">wordmark · 3.5rem</div></div>
  <div style="text-align:center;"><div class="fav"><span class="n">n</span><span class="dot"></span></div><div class="meta" style="margin-top:6px;">favicon.svg</div></div>
  <div style="max-width:260px;font-size:13px;color:#64748b;line-height:1.5;">Lowercase <strong style="color:#0f172a;">n</strong> + gradient period. The period is the ONLY decorated mark in the brand — used at 3.5rem in nav, 2rem in sidebars.</div>
</body>
</html>
