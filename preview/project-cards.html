<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:#f8fafc;}
  body{padding:18px;font-family:var(--font-sans);color:#0f172a;}
  .card{background:#fff;border:1px solid #e2e8f0;border-radius:14px;overflow:hidden;width:280px;}
  .strip{height:110px;display:flex;align-items:center;justify-content:center;font-size:3rem;background:linear-gradient(135deg,#eff6ff 0%,#f8fafc 100%);position:relative;border-bottom:1px solid #e2e8f0;}
  .strip::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,#3b82f6 0%,#06b6d4 100%);opacity:.06;}
  .body{padding:14px;}
  .meta{font-size:.78rem;color:#64748b;margin-bottom:.4rem;}
  .cat{display:inline-flex;gap:.3rem;padding:.2rem .55rem;border-radius:6px;background:#eff6ff;color:#3b82f6;font-size:.72rem;font-weight:600;margin-bottom:.4rem;}
  h3{font-size:.95rem;font-weight:700;margin:0 0 .3rem;line-height:1.35;}
  p{font-size:.82rem;color:#64748b;line-height:1.55;margin:0;}
</style>
</head>
<body style="display:flex;gap:16px;">
  <div class="card">
    <div class="strip">🗃️</div>
    <div class="body">
      <div class="meta">SQL &amp; Database · Jan 2026 · 15 min read</div>
      <div class="cat">SQL &amp; Database</div>
      <h3>Building a Relational Database for a Used Car Marketplace</h3>
    </div>
  </div>
  <div class="card">
    <div class="strip">🚲</div>
    <div class="body">
      <div class="meta">Data Science · Feb 2025</div>
      <div class="cat">Data Science</div>
      <h3>Uncovering NYC Bike-Share Patterns</h3>
    </div>
  </div>
</body>
</html>
