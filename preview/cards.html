<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:#f8fafc;}
  body{padding:22px;font-family:var(--font-sans);color:#0f172a;display:grid;grid-template-columns:1fr 1fr;gap:16px;}
  .card{background:#fff;border:1px solid #e2e8f0;border-radius:16px;padding:1.25rem;transition:all .3s ease;}
  .card:hover{border-color:#cbd5e1;box-shadow:0 4px 20px rgba(0,0,0,.05);transform:translateY(-2px);}
  .eyebrow{font-size:.8rem;color:#64748b;text-transform:uppercase;letter-spacing:.5px;margin-bottom:.4rem;}
  h3{font-size:1.1rem;font-weight:600;margin:0 0 .25rem;}
  p{font-size:.9rem;color:#64748b;margin:0;}
  .tag{font-size:.75rem;color:#3b82f6;background:#eff6ff;padding:.25rem .5rem;border-radius:4px;margin-right:4px;}
</style>
</head>
<body>
  <div class="card">
    <p class="eyebrow">BASED IN</p>
    <h3>Bandung, Indonesia 🇮🇩</h3>
  </div>
  <div class="card">
    <p class="eyebrow">CURRENT ROLE</p>
    <h3>GIS Data Processing</h3>
    <p>Trinusa Resources</p>
    <div style="margin-top:.75rem;"><span class="tag">GIS</span><span class="tag">Python</span></div>
  </div>
</body>
</html>
