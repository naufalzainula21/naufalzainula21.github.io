<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--bg);}
  body{padding:24px;font-family:var(--font-sans);}
  .row{display:flex;align-items:center;gap:24px;}
  .block{height:110px;width:240px;border-radius:14px;background:linear-gradient(135deg,#3b82f6 0%,#06b6d4 100%);}
  .chip{display:inline-block;padding:6px 14px;border-radius:9999px;background:linear-gradient(135deg,#3b82f6 0%,#06b6d4 100%);color:#fff;font-size:12px;font-weight:600;}
  .title{font-size:44px;font-weight:800;line-height:1;letter-spacing:-.02em;color:#0f172a;}
  .title span{background:linear-gradient(135deg,#3b82f6 0%,#06b6d4 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
  .meta{margin-top:8px;font-size:12px;color:#64748b;font-family:var(--font-mono);}
</style>
</head>
<body>
  <div class="row">
    <div class="block"></div>
    <div>
      <div class="title">Naufal <span>Zainul</span></div>
      <div class="meta">linear-gradient(135deg, #3b82f6 0%, #06b6d4 100%)</div>
      <div style="margin-top:12px;display:flex;gap:8px;align-items:center;">
        <span class="chip">gradient chip</span>
        <span style="font-size:12px;color:#64748b;">used as text clip + solid fill only</span>
      </div>
    </div>
  </div>
</body>
</html>
