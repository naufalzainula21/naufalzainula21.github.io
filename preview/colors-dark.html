<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:#0f172a;}
  body{padding:20px;}
  .grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;}
  .sw{border-radius:12px;padding:16px;border:1px solid #334155;display:flex;flex-direction:column;justify-content:space-between;height:96px;}
  .sw .name{font-size:12px;font-weight:600;font-family:var(--font-sans);}
  .sw .hex{font-size:11px;opacity:.75;font-family:var(--font-mono);letter-spacing:.02em;}
</style>
</head>
<body>
  <div class="grid">
    <div class="sw" style="background:#0f172a;color:#f1f5f9;"><span class="name">bg</span><span class="hex">#0f172a</span></div>
    <div class="sw" style="background:#1e293b;color:#f1f5f9;"><span class="name">bg-secondary / card</span><span class="hex">#1e293b</span></div>
    <div class="sw" style="background:#f1f5f9;color:#0f172a;"><span class="name">text</span><span class="hex">#f1f5f9</span></div>
    <div class="sw" style="background:#94a3b8;color:#0f172a;"><span class="name">text-secondary</span><span class="hex">#94a3b8</span></div>
    <div class="sw" style="background:#60a5fa;color:#0f172a;"><span class="name">accent</span><span class="hex">#60a5fa</span></div>
    <div class="sw" style="background:#1e3a5f;color:#60a5fa;"><span class="name">accent-light</span><span class="hex">#1e3a5f</span></div>
  </div>
</body>
</html>
