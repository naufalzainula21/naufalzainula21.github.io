<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--bg);}
  body{padding:22px;font-family:var(--font-sans);color:#0f172a;}
  .row{display:flex;align-items:flex-end;gap:14px;}
  .stack{display:flex;flex-direction:column;align-items:center;gap:6px;}
  .bar{background:#3b82f6;width:28px;border-radius:4px;}
  .lbl{font-size:10px;font-family:var(--font-mono);color:#64748b;}
</style>
</head>
<body>
  <div class="row">
    <div class="stack"><div class="bar" style="height:4px;"></div><span class="lbl">1 · 4</span></div>
    <div class="stack"><div class="bar" style="height:8px;"></div><span class="lbl">2 · 8</span></div>
    <div class="stack"><div class="bar" style="height:12px;"></div><span class="lbl">3 · 12</span></div>
    <div class="stack"><div class="bar" style="height:16px;"></div><span class="lbl">4 · 16</span></div>
    <div class="stack"><div class="bar" style="height:24px;"></div><span class="lbl">6 · 24</span></div>
    <div class="stack"><div class="bar" style="height:32px;"></div><span class="lbl">8 · 32</span></div>
    <div class="stack"><div class="bar" style="height:48px;"></div><span class="lbl">12 · 48</span></div>
    <div class="stack"><div class="bar" style="height:64px;"></div><span class="lbl">16 · 64</span></div>
  </div>
  <p style="margin-top:14px;font-size:12px;color:#64748b;max-width:560px;">Built on a 4px grid. Section padding = 4rem (64px) vertical. Card padding = 1.25–1.5rem (20–24px). Grid gap = 1rem (16px).</p>
</body>
</html>
