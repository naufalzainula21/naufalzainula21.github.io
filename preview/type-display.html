<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--bg);}
  body{padding:24px;font-family:var(--font-sans);color:#0f172a;}
  .specimen{display:grid;grid-template-columns:170px 1fr;gap:6px 20px;align-items:baseline;}
  .lbl{font-size:11px;color:#64748b;font-family:var(--font-mono);text-transform:uppercase;letter-spacing:.05em;}
  h1{font-size:3.2rem;font-weight:800;line-height:1.1;letter-spacing:-.02em;margin:0;}
  h1 span{background:linear-gradient(135deg,#3b82f6 0%,#06b6d4 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
</style>
</head>
<body>
  <div class="specimen">
    <div class="lbl">h1 / 3.2rem / 800</div>
    <h1>I'm <span>Naufal</span></h1>
  </div>
</body>
</html>
